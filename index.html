<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Suman Kumar Das | Portfolio</title>

  <!-- SEO -->
  <meta name="description" content="AI, Automation, Embedded Systems Projects by Suman Kumar Das">
  <meta name="keywords" content="AI Projects, Automation, GitHub Portfolio, Embedded Systems">
  <meta name="author" content="Suman Kumar Das">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      text-align: center;
      padding: 50px 20px;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    header p {
      color: #94a3b8;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      transition: 0.3s;
      border: 1px solid #334155;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #38bdf8;
    }

    .card h3 {
      margin-top: 0;
      color: #38bdf8;
    }

    .card p {
      font-size: 0.9rem;
      color: #cbd5f5;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #0ea5e9;
      font-weight: 500;
    }

    .highlight {
      text-align: center;
      margin: 30px 0;
      font-size: 1.2rem;
      color: #38bdf8;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 0.9rem;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <h1>🚀 My Project Portfolio</h1>
  <p>AI • Automation • Embedded Systems • Real-World Solutions</p>
</header>

<div class="container">

  <div class="highlight">
    ⚡ These are actively built projects — worth exploring
  </div>

  <div class="grid" id="repoGrid"></div>

</div>

<footer>
  Built by Suman Kumar Das • <a href="https://github.com/OrbitScript" style="color:#38bdf8;">GitHub Profile</a>
</footer>

<script>
  fetch("https://api.github.com/users/OrbitScript/repos")
    .then(res => res.json())
    .then(data => {

      // Sort by recently updated
      data.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

      const grid = document.getElementById("repoGrid");

      data.forEach(repo => {
        if (!repo.fork) {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <h3>${repo.name}</h3>
            <p>${repo.description || "No description provided."}</p>
            <a href="${repo.html_url}" target="_blank">🔗 View Project</a>
          `;

          grid.appendChild(card);
        }
      });
    });
</script>

</body>
</html>
