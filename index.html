<!DOCTYPE html>
<html>
<head>
  <title>Suman Kumar Das | Portfolio</title>
  <meta name="description" content="Projects in AI, Automation, Embedded Systems">
</head>
<body style="font-family: Arial; padding: 20px;">

  <h1>🚀 My GitHub Projects</h1>
  <p>By Suman Kumar Das</p>

  <ul id="repoList"></ul>

  <script>
    fetch("https://api.github.com/users/OrbitScript/repos")
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("repoList");

        data.forEach(repo => {
          if (!repo.fork) {
            const li = document.createElement("li");
            li.innerHTML = `
              <a href="${repo.html_url}" target="_blank">
                ${repo.name}
              </a> - ${repo.description || "No description"}
            `;
            list.appendChild(li);
          }
        });
      });
  </script>

</body>
</html>
